# CRM Calendario Clínica - clinica.softwaregandia.com
# En el VPS: sudo cp scripts/nginx-crm-clinica-softwaregandia.conf /etc/nginx/sites-available/clinica.softwaregandia.com
# Activar: sudo ln -sf /etc/nginx/sites-available/clinica.softwaregandia.com /etc/nginx/sites-enabled/
# Probar: sudo nginx -t && sudo systemctl reload nginx
#
# Requisito: Registro A en DNS clinica.softwaregandia.com -> 137.74.115.81

server {
    listen 80;
    server_name clinica.softwaregandia.com;
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
