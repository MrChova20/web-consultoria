# Colocar en el VPS en: /etc/nginx/sites-available/gandiasoftware.com
# Activar: sudo ln -sf /etc/nginx/sites-available/gandiasoftware.com /etc/nginx/sites-enabled/
# Probar: sudo nginx -t
# Recargar: sudo systemctl reload nginx
#
# Requisito: A record de gandiasoftware.com apuntando a la IP del VPS (137.74.115.81)

server {
    listen 80;
    server_name gandiasoftware.com www.gandiasoftware.com softwaregandia.com www.softwaregandia.com;
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
