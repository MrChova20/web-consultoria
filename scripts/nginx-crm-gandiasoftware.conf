# CRM Calendario Clínica - subdominio crm.gandiasoftware.com
# Colocar en el VPS: /etc/nginx/sites-available/crm.gandiasoftware.com
# Activar: sudo ln -sf /etc/nginx/sites-available/crm.gandiasoftware.com /etc/nginx/sites-enabled/
# Probar: sudo nginx -t && sudo systemctl reload nginx
#
# Requisito: Registro A en DNS para crm.gandiasoftware.com -> IP del VPS (137.74.115.81)

server {
    listen 80;
    server_name crm.gandiasoftware.com;
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
